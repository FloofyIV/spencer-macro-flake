name: Update flake source
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Get latest commit
        id: commit
        run: |
          rev=$(git ls-remote https://github.com/Spencer0187/Spencer-Macro-Utilities HEAD | cut -f1)
          echo "rev=$rev" >> $GITHUB_OUTPUT
      - name: Check if already up to date
        run: |
          current=$(grep 'rev = ' flake.nix | head -1 | sed 's/.*rev = "\(.*\)".*/\1/')
          latest="${{ steps.commit.outputs.rev }}"
          echo "Current: $current"
          echo "Latest:  $latest"
          if [ "$current" = "$latest" ]; then
            echo "Already up to date. Cancelling."
            exit 0
          fi
        id: check
      - name: Prefetch hash (correct for fetchFromGitHub)
        if: steps.check.outcome == 'success' && steps.commit.outputs.rev != ''
        id: prefetch
        run: |
          rev=${{ steps.commit.outputs.rev }}
          current=$(grep 'rev = ' flake.nix | head -1 | sed 's/.*rev = "\(.*\)".*/\1/')
          if [ "$current" = "$rev" ]; then
            echo "Skipping — already up to date."
            exit 0
          fi
          url="https://github.com/Spencer0187/Spencer-Macro-Utilities/archive/$rev.tar.gz"
          echo "Fetching $url"
          raw=$(nix-prefetch-url --unpack "$url")
          sha=$(nix hash to-sri --type sha256 "$raw")
          echo "sha256=$sha" >> $GITHUB_OUTPUT
      - name: Update flake
        if: steps.prefetch.outputs.sha256 != ''
        run: |
          sed -i 's|rev = ".*"|rev = "${{ steps.commit.outputs.rev }}"|' flake.nix
          sed -i 's|sha256 = ".*"|sha256 = "${{ steps.prefetch.outputs.sha256 }}"|' flake.nix
      - name: Build to verify
        if: steps.prefetch.outputs.sha256 != ''
        run: nix build .#
      - name: Commit and push changes
        if: steps.prefetch.outputs.sha256 != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "Update to newer SMU commit ${{ steps.commit.outputs.rev }}"
          git push
